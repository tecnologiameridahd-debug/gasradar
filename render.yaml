# Despliegue en Render.com (gratis)
# 1) Sube este repo a GitHub
# 2) En render.com: New → Blueprint → selecciona el repo
services:
  - type: web
    name: gasradar
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Pegar en Dashboard Render → Environment (no van en git):
      - key: DATABASE_URL
        sync: false
      - key: ZYLA_API_KEY
        sync: false
      - key: ZYLA_GAS_URL
        sync: false
      - key: ZYLA_STATION_URL
        sync: false
      - key: STATS_KEY
        sync: false
